services:
  - type: web
    name: na9l-pro-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://na9l-pro-api.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: na9l-pro-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: na9l-pro-db
    plan: free
    databaseName: na9l_pro
    user: na9l_pro_user
